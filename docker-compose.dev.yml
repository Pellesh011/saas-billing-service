version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache libc6-compat openssl &&
        npm install &&
        cd apps/backend &&
        npx prisma generate &&
        npx prisma db push --skip-generate &&
        npx ts-node prisma/seed.ts &&
        npx nest start --watch
      "
    volumes:
      - .:/app
      - backend_nm:/app/node_modules
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/billing
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache libc6-compat openssl &&
        npm install &&
        cd apps/frontend &&
        npm run dev
      "
    volumes:
      - .:/app
      - frontend_nm:/app/node_modules
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_nm:
  frontend_nm:
